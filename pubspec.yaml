name: ahsaan_project
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.1.2
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.7
  firebase_storage: ^12.4.5
  intl: ^0.20.2
  crop_your_image: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/lawlink_logo.png
    background_color: "#000000"
    theme_color: "#000000"
  windows:
    generate: true
    image_path: assets/lawlink_logo.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/lawlink_logo.png
  image_path: assets/lawlink_logo.png
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/lawlink_logo.png

flutter_native_splash:
  color: "#000000"
  image: assets/lawlink_logo.png
  android: true
  ios: true
  web: true
  android_12:
    color: "#000000"
    image: assets/lawlink_logo.png
